{{ if .IsHome }}
<!-- JSON-LD: WebSite -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "srvrlss.dev",
  "url": "{{ .Site.BaseURL }}",
  "author": {
    "@type": "Person",
    "name": "Alexandre Brisebois",
    "url": "{{ "about/" | absURL }}"
  },
  "description": "Technical outcomes at the intersection of cloud engineering, AI agents, and serverless patterns."
}
</script>
{{ end }}

<!-- JSON-LD: Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Alexandre Brisebois",
  "url": "{{ "about/" | absURL }}",
  "sameAs": [
    "{{ .Site.Params.linkedin }}",
    "{{ .Site.Params.github }}",
    "https://x.com/{{ .Site.Params.twitter }}",
    "{{ .Site.Params.bluesky }}"
  ]
}
</script>

{{ if .IsPage }}
<!-- JSON-LD: BlogPosting -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title }}",
  "description": "{{ if (and (isset .Params "description") (ne .Params.description "")) }}{{ .Params.description }}{{ else if (and (isset .Params "tldr") (ne .Params.tldr "")) }}{{ .Params.tldr }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}",
  "url": "{{ .Permalink }}",
  "author": {
    "@type": "Person",
    "name": "Alexandre Brisebois",
    "url": "{{ "about/" | absURL }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "srvrlss.dev",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>
{{ end }}

{{ if not .IsHome }}
<!-- JSON-LD: BreadcrumbList -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    }{{ if .IsPage }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }{{ end }}
  ]
}
</script>
{{ end }}
