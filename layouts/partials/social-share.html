<div class="social-share" aria-label="Social sharing options">
  <span class="share-label" aria-hidden="true">Share</span>
  <a href="https://twitter.com/intent/tweet?url={{ .Permalink | urlize }}&text={{ .Title | urlize }}" target="_blank" rel="noopener noreferrer" aria-label="Share on X">X</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlize }}" target="_blank" rel="noopener noreferrer" aria-label="Share on LinkedIn">LinkedIn</a>
  <a href="https://www.reddit.com/submit?url={{ .Permalink | urlize }}&title={{ .Title | urlize }}" target="_blank" rel="noopener noreferrer" aria-label="Share on Reddit">Reddit</a>
  <a href="https://bsky.app/intent/compose?text={{ .Title | urlize }}%20{{ .Permalink | urlize }}" target="_blank" rel="noopener noreferrer" aria-label="Share on Bluesky">Bluesky</a>
  <button
    class="copy-link"
    data-url="{{ .Permalink }}"
    onclick="(function(btn){navigator.clipboard.writeText(btn.dataset.url).then(function(){var orig=btn.textContent;btn.textContent='Copied!';setTimeout(function(){btn.textContent=orig},2000)});})(this)"
    aria-label="Copy link to clipboard"
  >Copy Link</button>
</div>
