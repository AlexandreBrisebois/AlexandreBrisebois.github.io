name: Content Automation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'pr'
        type: choice
        options:
          - pr
      force_posts:
        description: 'Comma-separated post filenames to process'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'workflow_dispatch' || github.actor == 'AlexandreBrisebois')
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pyyaml==6.0.3

      - name: Run content automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.base_ref || 'main' }}
          FORCE_POSTS: ${{ github.event.inputs.force_posts }}
        run: |
          # Run PR automation (links, per-post images)
          MODE="${{ github.event.inputs.mode || 'pr' }}"
          python3 .github/scripts/content_automation.py --mode $MODE


