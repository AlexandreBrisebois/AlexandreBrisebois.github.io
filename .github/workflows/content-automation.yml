name: Content Automation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      force_posts:
        description: 'Comma-separated post filenames to process (e.g. hello-world.md,first-retrospective.md). Leave empty to use git diff.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install google-generativeai pyyaml

      - name: Run content automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.base_ref || 'main' }}
          FORCE_POSTS: ${{ github.event.inputs.force_posts }}
        run: python3 .github/scripts/content_automation.py
