name: Maintenance

on:
  schedule:
    # Social Discussion Loop: every Friday at 15:00 UTC
    - cron: '0 15 * * 5'
    # Content Freshness Audit: every 3 weeks (Sunday 08:00 UTC, ~21-day cycle)
    - cron: '0 8 1,22 * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Maintenance mode to run'
        required: true
        type: choice
        options:
          - social-loop
          - freshness-audit

permissions:
  contents: read
  issues: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.actor == 'AlexandreBrisebois'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install google-generativeai==0.8.6 pyyaml==6.0.3

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "5" ]; then
            echo "mode=social-loop" >> $GITHUB_OUTPUT
          else
            echo "mode=freshness-audit" >> $GITHUB_OUTPUT
          fi

      - name: Run maintenance
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MAINTENANCE_MODE: ${{ steps.mode.outputs.mode }}
        run: python3 .github/scripts/content_automation.py --mode ${{ steps.mode.outputs.mode }}
