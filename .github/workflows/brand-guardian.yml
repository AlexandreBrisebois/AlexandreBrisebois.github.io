name: Brand Guardian

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/content/blog/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Brand Guardian
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/brand_guardian.py

      - name: Post Comment
        if: success()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: social_drafts.md
