name: Record Social Post

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug (e.g. why-i-built-this-blog)'
        required: true
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - linkedin
          - x
          - bluesky
      url:
        description: 'URL of your social post'
        required: true

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    if: github.actor == 'AlexandreBrisebois'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pyyaml==6.0.3

      - name: Update social_posts frontmatter
        env:
          INPUT_SLUG: ${{ github.event.inputs.slug }}
          INPUT_PLATFORM: ${{ github.event.inputs.platform }}
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          python3 - <<'EOF'
          import io, os, pathlib, sys
          import yaml

          slug = os.environ["INPUT_SLUG"].strip()
          platform = os.environ["INPUT_PLATFORM"].strip()
          url = os.environ["INPUT_URL"].strip()

          posts_dir = pathlib.Path("content/posts")
          target: pathlib.Path | None = None

          for md in posts_dir.glob("*.md"):
              text = md.read_text(encoding="utf-8")
              if not text.startswith("---"):
                  continue
              end = text.find("\n---", 3)
              if end == -1:
                  continue
              fm = yaml.safe_load(text[3:end]) or {}
              if fm.get("slug") == slug or md.stem == slug:
                  target = md
                  body = text[end + 4:]
                  break

          if target is None:
              print(f"[ERROR] No post found with slug '{slug}'", file=sys.stderr)
              sys.exit(1)

          # Re-parse cleanly
          text = target.read_text(encoding="utf-8")
          end = text.find("\n---", 3)
          fm = yaml.safe_load(text[3:end]) or {}
          body = text[end + 4:]

          social = fm.get("social_posts") or {}
          social[platform] = url
          fm["social_posts"] = social

          buf = io.StringIO()
          buf.write("---\n")
          yaml.dump(fm, buf, default_flow_style=False, allow_unicode=True, sort_keys=False)
          buf.write("---")
          buf.write(body)

          tmp = target.with_suffix(".tmp")
          tmp.write_text(buf.getvalue(), encoding="utf-8")
          tmp.replace(target)

          print(f"[INFO] Updated {target.name}: social_posts.{platform} = {url}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --cached --quiet && echo "[INFO] Nothing to commit" && exit 0
          git commit -m "[social] Record ${{ github.event.inputs.platform }} post for ${{ github.event.inputs.slug }}"
          git push
